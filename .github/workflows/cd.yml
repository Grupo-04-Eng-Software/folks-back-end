name: CD - Publish Docker image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Sanitiza o usuario (remove espacos/quebras de linha que possam vir no secret)
      # para montar o nome da imagem sem risco de gerar tag invalida (ex: "/folks-back-end").
      - name: Define image name
        env:
          RAW_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          USER_CLEAN="$(echo "$RAW_USER" | tr -d '[:space:]')"
          echo "IMAGE_NAME=${USER_CLEAN}/folks-back-end" >> "$GITHUB_ENV"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
