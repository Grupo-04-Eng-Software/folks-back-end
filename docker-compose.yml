version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: folksflow-db
    environment:
      POSTGRES_DB: folksflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d folksflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: folksflow-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: folksflow
      DB_USER: postgres
      DB_PASSWORD: root
      JWT_SECRET: senha-braba-demais-no-docker
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
